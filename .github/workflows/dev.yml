name: Build Dev Prerelease

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version
        run: echo "VERSION=$(grep 'AppVersion.*=' internal/config/config.go | cut -d'"' -f2)" >> $GITHUB_ENV

      - name: Build macOS
        run: wails build -platform=darwin/arm64

      - name: Prepare DMG folder
        run: |
          mkdir -p dmg-staging
          cp -R build/bin/AlfaRemoteClient.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

      - name: Create DMG with Applications symlink
        run: |
          hdiutil create -volname "AlfaRemoteClient-$VERSION" -srcfolder dmg-staging -ov -format UDZO "ARC-$VERSION.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: arc-macos
          path: ARC-${{ env.VERSION }}.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version
        run: |
          $version = (Get-Content internal/config/config.go | Select-String 'AppVersion.*=' | ForEach-Object { ($_ -split '"')[1] })
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Build Windows with NSIS
        run: wails build -platform=windows/amd64 -nsis

      - name: Find Windows installer
        run: |
          $installer = Get-ChildItem "build\bin\*.exe" | Where-Object { $_.Name -match "installer" } | Select-Object -First 1
          if ($installer) {
            Write-Host "Found installer: $($installer.Name)"
            Copy-Item $installer.FullName "ARC-$env:VERSION-installer.exe"
          } else {
            Write-Host "No installer found, looking for all exe files..."
            Get-ChildItem "build\bin\*.exe" | ForEach-Object { Write-Host $_.Name }
            exit 1
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: arc-windows
          path: ARC-${{ env.VERSION }}-installer.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=$(grep 'AppVersion.*=' internal/config/config.go | cut -d'"' -f2)" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Prerelease
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev-${{ env.VERSION }}
          name: Dev Build v${{ env.VERSION }}
          draft: false
          prerelease: true
          files: |
            artifacts/ARC-${{ env.VERSION }}.dmg
            artifacts/ARC-${{ env.VERSION }}-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}