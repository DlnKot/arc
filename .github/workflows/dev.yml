name: Build Dev Prerelease

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version
        run: echo "VERSION=$(grep 'AppVersion.*=' internal/config/config.go | cut -d'"' -f2)" >> $GITHUB_ENV

      - name: Build macOS
        if: matrix.platform == 'macos-latest'
        run: wails build -platform=darwin/arm64

      - name: Build Windows
        if: matrix.platform == 'windows-latest'
        run: wails build -platform=windows/amd64

      - name: Upload artifact macOS
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ARC-dev-macos
          path: build/bin/ARC-darwin-arm64.tar.gz
          retention-days: 7

      - name: Upload artifact Windows
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ARC-dev-windows
          path: build/bin/ARC-windows-amd64.exe
          retention-days: 7